services:
  - type: web
    name: captin-calc-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: MONGO_DB
        value: captincalc
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_USERNAME
        value: admin
